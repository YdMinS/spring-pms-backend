# Development Profile
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/pms_db?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:pms_user}
    password: ${DB_PASSWORD:pms_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
