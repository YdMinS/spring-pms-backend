spring:
  application:
    name: spring-pms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  prefix: Bearer

image:
  storage:
    uploadDir: /app/uploads/products
    baseUrl: /api/products
    maxFileSize: 20971520
    allowedMimeTypes: image/jpeg,image/png
    allowedExtensions: jpg,jpeg,png

server:
  port: 8083
  tomcat:
    max-http-post-size: 20971520
    max-swallow-size: 20971520
