spring:
  application:
    name: spring-pms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: YOUR_32_BYTE_SECRET_KEY_PLACEHOLDER_HERE_12345678
  expiration: 86400000
  prefix: Bearer

server:
  port: 8083
