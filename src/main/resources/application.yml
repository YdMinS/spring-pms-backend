spring:
  application:
    name: spring-pms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 1800000          # 30m
  refresh-expiration: 1209600000   # 14d
  prefix: Bearer

oklyx:
  crypto:
    # AES-256 master key (32-byte Base64). Inject via OKLYX_CRYPTO_MASTER_KEY env var in prod/dev.
    # The default below is a boot-time placeholder — the real secret MUST be overridden via env var.
    master-key: ${OKLYX_CRYPTO_MASTER_KEY:P5m4nQbR+G+j8ekvlzQpnRgmSWgGSQWdJCzZCndLNew=}
  coupang:
    # Ordersheet list query (daily paging) GET_ORDERSHEET. {vendorId} is replaced with the account vendorId.
    ordersheets-path: /v2/providers/openapi/apis/api/v5/vendors/{vendorId}/ordersheets
    # Ordersheet query window (days): createdAtFrom = today − sync-days. Coupang caps the range at < 31 days.
    # Status is only refreshed for orders whose createdAt falls inside this window; orders that age out
    # freeze at their last status (e.g. ACCEPT/결제완료). Widening triggers Coupang 504s, so instead the
    # order-history & purchase-list views are also bounded to this same window (by paidAt) so stale rows
    # are never shown. Keep this in sync with the display filter in OrderQueryService/PurchaseListService.
    sync-days: 14
    # INSTRUCT (상품준비중) query window (days) for the shipping-label spreadsheet only.
    # INSTRUCT orders are transitioned manually (by the seller in Coupang WING) well after the order
    # was created, so their createdAt is old — a narrow window drops current INSTRUCT orders and the
    # download comes back empty. Kept wide (Coupang caps the range at < 31 days).
    instruct-days: 30
    # Return/cancel request list query GET_RETURN_REQUEST_BY_QUERY (cancelType=CANCEL to reconcile paid-order cancellations).
    returnrequests-path: /v2/providers/openapi/apis/api/v6/vendors/{vendorId}/returnRequests
    # Cancel reconciliation window (days): wider than ordersheets to cover delayed cancellations. Coupang max 31 days.
    cancel-sync-days: 7

image:
  storage:
    uploadDir: /app/uploads/products
    baseUrl: /api/products
    maxFileSize: 20971520
    allowedMimeTypes: image/jpeg,image/png
    allowedExtensions: jpg,jpeg,png

server:
  port: 8083
  tomcat:
    max-http-post-size: 20971520
    max-swallow-size: 20971520
