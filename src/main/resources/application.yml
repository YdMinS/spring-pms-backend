spring:
  application:
    name: spring-pms-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  web:
    resources:
      static-locations: file:${upload.path}/,classpath:/static/
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8083

upload:
  path: ${HOME}/services/pms/images
  max-size: 20971520
  allowed-types: jpg,jpeg,png,webp,gif
