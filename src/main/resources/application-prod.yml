# Production Profile
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  logging:
    level:
      root: WARN
      com.pms: INFO
      org.springframework: WARN
      org.hibernate: WARN
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  prefix: Bearer

server:
  tomcat:
    max-http-post-size: 20971520
    max-swallow-size: 20971520
